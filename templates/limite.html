{% extends "base.html" %}

{% block title %}Límite - El Taller de Marta{% endblock %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<style>
    #calendar {
        max-width: 100%;
        font-size: 0.88rem;
    }
    .fc-event {
        cursor: pointer;
        border-radius: 4px !important;
        padding: 2px 5px !important;
        font-size: 0.8rem;
    }
    .fc-toolbar-title {
        font-size: 1.2rem !important;
    }
    .event-tooltip {
        display: none;
        position: absolute;
        background: #1e293b;
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.82rem;
        z-index: 9999;
        max-width: 250px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        pointer-events: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="page-title"><i class="bi bi-calendar3 me-2"></i>Límite de Pedidos</h2>
    <span class="text-muted">Pedidos pendientes por fecha límite</span>
</div>

<div class="row g-3">
    <div class="col-12 col-lg-9">
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="calendar"></div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-3">
        <div class="card shadow-sm">
            <div class="card-header fw-semibold">
                <i class="bi bi-list-check me-2"></i>Pedidos pendientes
                <span class="badge bg-primary ms-1" id="pendingCount">0</span>
            </div>
            <div class="card-body p-0">
                <div id="pendingList" class="list-group list-group-flush" style="max-height:500px; overflow-y:auto;">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="event-tooltip" id="eventTooltip"></div>
{% endblock %}

{% block extra_scripts %}
<script>
const calendarEvents = {{ events | safe }};

document.addEventListener('DOMContentLoaded', function() {
    // Populate sidebar list
    const pendingList = document.getElementById('pendingList');
    document.getElementById('pendingCount').textContent = calendarEvents.length;

    // Sort by date
    const sorted = [...calendarEvents].sort(function(a, b) {
        return new Date(a.start) - new Date(b.start);
    });

    sorted.forEach(function(ev) {
        const item = document.createElement('div');
        item.className = 'list-group-item list-group-item-action py-2 px-3';
        const date = new Date(ev.start);
        const dateStr = date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const isPast = date < new Date();
        item.innerHTML = '<div class="d-flex justify-content-between align-items-start">' +
            '<div><small class="fw-semibold">' + ev.title + '</small>' +
            (ev.extendedProps.descripcion ? '<br><small class="text-muted">' + ev.extendedProps.descripcion + '</small>' : '') +
            '</div>' +
            '<span class="badge ' + (isPast ? 'bg-danger' : 'bg-warning text-dark') + ' ms-2 flex-shrink-0">' + dateStr + '</span>' +
            '</div>';
        pendingList.appendChild(item);
    });

    if (calendarEvents.length === 0) {
        pendingList.innerHTML = '<div class="text-center text-muted py-4"><i class="bi bi-check2-all d-block mb-1"></i><small>Sin pedidos pendientes</small></div>';
    }

    // Initialize FullCalendar
    const calEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,listMonth'
        },
        buttonText: {
            today: 'Hoy',
            month: 'Mes',
            list: 'Lista'
        },
        events: calendarEvents.map(function(ev) {
            const isPast = new Date(ev.start) < new Date();
            return Object.assign({}, ev, {
                backgroundColor: isPast ? '#ef4444' : '#f59e0b',
                borderColor: isPast ? '#dc2626' : '#d97706',
                textColor: isPast ? '#fff' : '#1e293b'
            });
        }),
        eventDidMount: function(info) {
            const tooltip = document.getElementById('eventTooltip');
            info.el.addEventListener('mouseenter', function(e) {
                const props = info.event.extendedProps;
                let html = '<strong>' + info.event.title + '</strong>';
                if (props.descripcion) html += '<br><span class="text-white-50">' + props.descripcion + '</span>';
                if (props.proveedor) html += '<br><i class="bi bi-person me-1"></i>' + props.proveedor;
                html += '<br><i class="bi bi-calendar me-1"></i>' + info.event.startStr;
                tooltip.innerHTML = html;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.pageX + 12) + 'px';
                tooltip.style.top = (e.pageY - 10) + 'px';
            });
            info.el.addEventListener('mousemove', function(e) {
                tooltip.style.left = (e.pageX + 12) + 'px';
                tooltip.style.top = (e.pageY - 10) + 'px';
            });
            info.el.addEventListener('mouseleave', function() {
                tooltip.style.display = 'none';
            });
        }
    });

    calendar.render();
});
</script>
{% endblock %}
